services:
  proxy:
    build: .
    container_name: omi-soniox-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      SONIOX_API_KEY: ${SONIOX_API_KEY}
      PORT: ${PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SONIOX_MODEL: ${SONIOX_MODEL:-stt-rt-v4}
      SONIOX_LANGUAGE_HINTS: ${SONIOX_LANGUAGE_HINTS:-en,pl}
      AUDIO_PASSTHROUGH: ${AUDIO_PASSTHROUGH:-true}
